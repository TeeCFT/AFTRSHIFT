<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICEL!NK</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; height: 100%; font-family: 'Inter', sans-serif; background: #030303; }
        
        /* The container holds the image and the button layer */
        .app-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            margin: 0 auto;
            background: url('cookie.png') no-repeat center center;
            background-size: cover;
        }

        /* The layer on top of the image */
        .overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(transparent, rgba(3, 3, 3, 0.95));
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-main { background: #00e5ff; color: #000; }
        .btn-sub { background: rgba(255,255,255,0.1); color: #fff; backdrop-filter: blur(10px); }
        
        /* Slide-up Form */
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: #111; border-radius: 20px 20px 0 0; transition: 0.4s;
            padding: 20px; z-index: 100;
        }
        .modal.active { bottom: 0; }
    </style>
</head>
<body>

<div className="relative h-screen w-full overflow-hidden">
  {/* Full Screen Image Layer */}
  <img 
    src="cookie.png" 
    alt="ICELINK" 
    className="absolute inset-0 h-full w-full object-cover" 
  />

  {/* Button Placement Layer */}
  <div className="absolute inset-x-0 bottom-12 flex flex-col items-center gap-4 px-6">
    
    {/* Top Row: LOGIN + SIGNUP */}
    <div className="flex w-full max-w-[360px] gap-3">
      <MetalButton className="flex-1" variant="default" onClick={openModal}>LOGIN</MetalButton>
      <MetalButton className="flex-1" variant="default" onClick={openModal}>SIGNUP</MetalButton>
    </div>

    {/* Middle Row: GOOGLE */}
    <div className="w-full max-w-[360px]">
      <MetalButton className="w-full" variant="primary" onClick={handleGoogle}>
        CONTINUE WITH GOOGLE
      </MetalButton>
    </div>

    {/* Bottom Row: BE ICEMAN */}
    <div className="w-full max-w-[360px]">
      <MetalButton className="w-full bg-transparent border border-white/20" onClick={openModal}>
        BE ICEMAN ❄️
      </MetalButton>
    </div>
    
  </div>
</div>


<div id="formModal" class="modal">
    <h2 style="color:#fff;">Form</h2>
    <button onclick="closeModal()">CLOSE</button>
</div>

<script>
    // Supabase Init
    const supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

    // Remember User
    window.onload = () => {
        const user = localStorage.getItem('icelink_user');
        if(user) console.log("Welcome back, Iceman");
    };

    function openModal() { document.getElementById('formModal').classList.add('active'); }
    function closeModal() { document.getElementById('formModal').classList.remove('active'); }
    
    async function handleGoogle() {
        const { data, error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
        if(!error) localStorage.setItem('icelink_user', JSON.stringify(data));
    }
</script>
</body>
</html>
